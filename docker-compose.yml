version: '3.8'

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: tera
      POSTGRES_PASSWORD: tera123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager
      SPRING_DATASOURCE_USERNAME: tera
      SPRING_DATASOURCE_PASSWORD: tera123
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: